name: soulsync
description: Your digital soul — a life companion that listens, remembers, and grows with you.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Audio recording
  record: ^5.1.2

  # Speech-to-text (continuous listening)
  speech_to_text: ^6.6.2

  # Text-to-speech
  flutter_tts: ^4.0.2

  # Storage
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Networking (Claude API)
  http: ^1.2.1

  # Google integrations (Calendar + Gmail)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  device_calendar: ^4.3.1

  # Permissions
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1

  # Notifications (nightly review reminder)
  flutter_local_notifications: ^17.2.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
